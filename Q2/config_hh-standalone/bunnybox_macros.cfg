##########################
#  box_extras.py Macros  #
##########################

[gcode_macro BOX_HOME_XY]
description: Home X or Y axes if they are not already homed. Z axis is ignored.
gcode:
    {% set need_x = "x" not in printer.toolhead.homed_axes %}
    {% set need_y = "y" not in printer.toolhead.homed_axes %}
    {% if need_x or need_y %}
        G28{% if need_x %} X{% endif %}{% if need_y %} Y{% endif %}
    {% endif %}


[gcode_macro BOX_MOVE_TO_TRASH]
description: Move tool-head over the poop chute, navigating safely from the bed
gcode:
    BOX_HOME_XY
    M204 S5000
    {% if (printer.gcode_move.position.y) > 270 %}
        {% if (printer.gcode_move.position.x) > 112 or (printer.gcode_move.position.x) < 85 %}
            G1 Y270 F20000
            G1 X85 F20000
            G1 Y270 F20000
            G1 Y287.5 F1500
        {% endif %}
        G1 X85 F20000
        G1 Y287.5 F1500
    {% else %}
        G1 X85 F20000
        G1 Y260 F20000
        G1 Y287.5 F1500
    {% endif %}

[gcode_macro BOX_CUSTOM_PARK]
description: Happy Hare custom park macro to safely navigate trash bin
gcode:
    {% set x = params.X|float %}
    {% set y = params.Y|float %}
    {% set feed = params.F|float %}

    {% if y > 270 and printer.gcode_move.position.y <= 270 %}
        BOX_MOVE_TO_TRASH
    {% elif y <= 270 and printer.gcode_move.position.y > 270 %}
        G1 Y270 F1500
        G1 X{x} Y{y} F{feed}
    {% else %}
        G1 X{x} Y{y} F{feed}
    {% endif %}

[gcode_macro _WIGGLE]
gcode:
    {% set x1 = params.X1|float %}
    {% set x2 = params.X2|float %}
    {% set n  = params.COUNT|default(1)|int %}
    {% set f  = params.F|default(5000)|float %}
    {% for _ in range(n) %}
    G1 X{x1} F{f}
    G1 X{x2} F{f}
    {% endfor %}

[gcode_macro BOX_CLEAR_FLUSH]
description: Move to the chute and perform a rapid series of movements to clear any nozzle flush
gcode:
    BOX_HOME_XY
    M204 S5000
    BOX_CUSTOM_PARK X=85 Y=287.5 F=5000
    _WIGGLE X1=103 X2=90  COUNT=5
    _WIGGLE X1=114 X2=100 COUNT=7
    _WIGGLE X1=103 X2=90  COUNT=5
    G1 X85 Y287.5 F5000

[gcode_macro BOX_CLEAR_OOZE]
description: Wipe the nozzle cleanly on the bed plate scrapper and silicone wiper
gcode:
    BOX_HOME_XY
    G1 X130 Y280 F6000
    G1 Z-0.2 F600

    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=150
    M106 S255

    ; scraper
    {% for _ in range(3) %}
    G2 I0.5 J0.5 F600
    {% endfor %}

    G1 X140 F200
    G1 Y281 F200
    G1 X130 F200
    G1 Y283 F200
    G1 X140 F200

    {% for _ in range(3) %}
    G2 I0.5 J0.5 F600
    {% endfor %}

    G1 Z0.2
    G1 X180 F12000
    G1 Z-1.5
    ; wiper
    _WIGGLE X1=164 X2=180 COUNT=4 F=12000
    M400

[gcode_macro BOX_CLEAN_NOZZLE]
description: Perform in-print nozzle clean by flushing and wiping
gcode:
    {% set full = params.FULL|default(0)|int %}
    {% set print_temp = params.TARGET|default(printer.extruder.target|default(0))|int %}

    M104 S150
    {% if print_temp > 155 %}
        ; nozzle hot (in-print)
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM=140 MAXIMUM={print_temp-30}
    {% else %}
        ; nozzle cool (preheat)
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM=140
    {% endif %}

    BOX_CLEAR_FLUSH
    {% if full %}
        BOX_CLEAR_OOZE
        G1 Z30 F900
        G1 Y10 F18000
        G1 X260 F18000
        M106 S0
    {% endif %}

    {% if print_temp > 155 %}
        ; reheat to print temp
        M104 S{print_temp}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={print_temp-30}
    {% elif print_temp == 0 %}
        ; standalone
        M104 S0
    {% endif %}

[gcode_macro BOX_CLEAN_NOZZLE_FULL]
description: Perform full nozzle clean by flushing and wiping
gcode:
    BOX_CLEAN_NOZZLE FULL=1

[gcode_macro BOX_MOVE_TO_CUTTER]
description: Move tool-head to the filament cutter activation block
gcode:
    BOX_HOME_XY
    M204 S10000
    {% if printer.gcode_move.position.x < 15 %}
        G1 X15 F9000
    {% endif %}
    M400
    G1 X15 F24000
    G1 Y0.5 F24000
    M400

[gcode_macro BOX_DO_CUT]
description: Move tool-head activate the filament cutter
gcode:
    G1 X-0.5 F5000
    G4 P500
    G1 X1 F1000
    G1 X-0.5 F5000
    G4 P500
    G1 X1 F1000
    G4 P1000
    G1 X15 F3000

[gcode_macro CUT_FILAMENT]
description: Moves to cutter, tensions filament, and cuts.
gcode:
    {% set T = printer.mmu.tool|default(-1)|int %}
    {% set sv = printer.save_variables.variables %}
    RESPOND TYPE=command MSG="Performing filament cut"

    BOX_MOVE_TO_CUTTER   
    BOX_DO_CUT

[gcode_macro DISABLE_BOX_HEATER]
description: Box end gcode wrapped in stock macro
gcode:
    SET_HEATER_TEMPERATURE HEATER=box1_heater TARGET=0

[gcode_macro TRY_SELFRECOVERY]
description: Print resume with error handling
gcode:
    {% set T = printer.mmu.tool %}
    MMU_RESTORE
    MMU_CHANGE_TOOL TOOL={T} STANDALONE=1

[gcode_macro BOX_PRINT_START]
description: Empty macro for compatibility with Qidi gcode macros
gcode:

[gcode_macro CLEAR_TOOLCHANGE_STATE]
description: Empty macro for compatibility with Qidi gcode macros
gcode:

[gcode_macro EXTRUSION_AND_FLUSH]
description: Empty macro for compatibility with Qidi gcode macros
gcode:

[gcode_macro BUFFER_MONITORING]
description: Empty macro for compatibility with Qidi gcode macros
gcode:
################################
### QIDI STOCK SLICER MACROS ###
################################
#
# These are necessary to interface with stock slicer profile
# Not currently used, but kept for reference / future slicer-driven profiles
#

[gcode_macro TOOL_CHANGE_START]
description: Initialize tool change (slicer macro)
gcode:
    SAVE_VARIABLE VARIABLE=is_tool_change VALUE=1
    ENABLE_RUNOUT SENSOR=extruder ENABLE=0
    BOX_MOVE_TO_TRASH

[gcode_macro TOOL_CHANGE_END]
description: Finalize tool change (slicer macro)
gcode:
    SAVE_VARIABLE VARIABLE=is_tool_change VALUE=0
    ENABLE_RUNOUT SENSOR=extruder ENABLE=1

[gcode_macro _BOX_UNLOAD]
description: Internal shared unload
gcode:
    {% if printer.mmu.enabled == 1 %}
        MMU_UNLOAD
    {% endif %}

[gcode_macro UNLOAD_T0]
gcode: _BOX_UNLOAD

[gcode_macro UNLOAD_T1]
gcode: _BOX_UNLOAD

[gcode_macro UNLOAD_T2]
gcode: _BOX_UNLOAD

[gcode_macro UNLOAD_T3]
gcode: _BOX_UNLOAD


################################
### QIDI STOCK SCREEN MACROS ###
################################
#
# These are necessary to interface with the printer screen
#

# The Qidi screen auto-runs DETECT_INTERRUPTION at boot and parses the three
# stock M118 lines into a Yes/No "resume last print?" popup that auto-cancels
# on timeout. The "resume" path depends on Qidi's closed-source power-loss
# recovery and does not restore MMU tool or gate state, so any resume would
# start printing with wrong filament. Neutralise it: just clear the flag
# silently.
#
# The installer comments out the stock DETECT_INTERRUPTION (if any) so this
# definition is the only one Klipper sees. Don't add `rename_existing:` here —
# on mainline Klipper / FreeDi installs the stock macro may not exist and the
# rename would fail at config load.
[gcode_macro DETECT_INTERRUPTION]
gcode:
    SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False

[gcode_macro E_LOAD]
gcode:
    {% set slot = params.SLOT|default(-1)|int %}
    MMU_CHANGE_TOOL TOOL={slot}

[gcode_macro E_UNLOAD]
gcode:
    {% set slot = params.SLOT|default(-1)|int %}
    MMU_SELECT GATE={slot}
    MMU_UNLOAD

[gcode_macro E_BOX]
gcode:
    {% set slot = params.SLOT|default(-1)|int %}
    MMU_EJECT GATE={slot}
