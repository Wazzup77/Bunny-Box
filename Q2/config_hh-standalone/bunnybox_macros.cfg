##########################
#  box_extras.py Macros  #
##########################

[gcode_macro BOX_HOME_XY]
description: Home X or Y axes if they are not already homed.  Z axis is ignored
gcode:
    {% if "x" not in printer.toolhead.homed_axes %}
        {% if "y" not in printer.toolhead.homed_axes %}
            G28 Y X         # Home X and Y Axes
        {% else %}
            G28 X           # Home X Only
        {% endif %}
    {% else %}
        {% if "y" not in printer.toolhead.homed_axes %}
            G28 Y           # Home Y Only
        {% endif %}
    {% endif %}

[gcode_macro BOX_CUSTOM_PARK]
description: Happy Hare custom park macro to safely navigate trash bin
gcode:
    {% set x = params.X|float %}
    {% set y = params.Y|float %}
    {% set feed = params.F|float %}

    {% if y > 270 and printer.gcode_move.position.y <= 270 %}
        MOVE_TO_TRASH
    {% elif y <= 270 and printer.gcode_move.position.y > 270 %}
        G1 Y270 F1500
        G1 X{x} Y{y} F{feed}
    {% else %}
        G1 X{x} Y{y} F{feed}
    {% endif %}


[gcode_macro BOX_CLEAR_FLUSH]
description: Move to the chute and perform a rapid series of movements to clear any nozzle flush
gcode:
    BOX_HOME_XY
    M204 S5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000

        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000

        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000

        G1 X85 Y287.5 F5000

[gcode_macro BOX_CLEAR_OOZE]
description: Wipe the nozzle cleanly on the bed plate scrapper and silicone wiper
gcode:
    BOX_HOME_XY
    G1 X130 Y280 F6000
    G1 Z-0.2 F600

    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=150
    M106 S255
    G2 I0.5 J0.5 F600
    G2 I0.5 J0.5 F600
    G2 I0.5 J0.5 F600
    G1 X140 F200
    G1 Y281 F200
    G1 X130 F200
    G1 Y283 F200
    G1 X140 F200

    G2 I0.5 J0.5 F600
    G2 I0.5 J0.5 F600
    G2 I0.5 J0.5 F600

    G1 Z0.2
    G1 X180 F12000
    G1 Z-1.5
    G1 X164 F12000
    G1 X180 F12000
    G1 X164 F12000
    G1 X180 F12000
    G1 X164 F12000
    G1 X180 F12000
    G1 X164 F12000
    M400

[gcode_macro BOX_CLEAN_NOZZLE]
description: Perform in-print nozzle clean by flushing and wiping 
gcode:
    {% set print_temp = printer.extruder.target|default(0)|int %}

    {% if print_temp > 0 %}
        M104 S150
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM=140 MAXIMUM={print_temp-30}
    {% else %}
        RESPOND TYPE=command MSG="Heating nozzle for cleaning"
        M109 S150
    {% endif %}

    BOX_CLEAR_FLUSH
    
    {% if print_temp > 0 %}
        M104 S{print_temp}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={print_temp-30}
    {% else %}
        M104 S0
    {% endif %}

[gcode_macro BOX_CLEAN_NOZZLE_FULL]
description: Perform full nozzle clean by flushing and wiping 
gcode:
    {% set print_temp = printer.extruder.target|default(0)|int %}

    {% if print_temp > 0 %}
        M104 S150
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM=140 MAXIMUM={print_temp-30}
    {% else %}
        RESPOND TYPE=command MSG="Heating nozzle for cleaning"
        M109 S150
    {% endif %}

    BOX_CLEAR_FLUSH
    BOX_CLEAR_OOZE

    G1 Z30 F900
    G1 Y10 F18000
    G1 X260 F18000
    M106 S0

    {% if print_temp > 0 %}
        M104 S{print_temp}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={print_temp-30}
    {% else %}
        M104 S0
    {% endif %}

[gcode_macro BOX_MOVE_TO_CUTTER]
description: Move tool-head to the filament cutter activation block
gcode:
    BOX_HOME_XY
    M204 S10000
    {% if printer.gcode_move.position.x < 15 %}
        G1 X15 F9000
    {% endif %}
    M400
    G1 X15 F24000
    G1 Y0.5 F24000
    M400

[gcode_macro BOX_DO_CUT]
description: Move tool-head activate the filament cutter
gcode:
    G1 X-0.5 F5000
    G4 P500
    G1 X1 F1000
    G1 X-0.5 F5000
    G4 P500
    G1 X1 F1000
    G4 P1000
    G1 X15 F3000

[gcode_macro CUT_FILAMENT]
description: Moves to cutter, tensions filament, and cuts.
gcode:
    {% set T = printer.mmu.tool|default(-1)|int %}
    {% set sv = printer.save_variables.variables %}
    RESPOND TYPE=command MSG="Performing filament cut"

    BOX_MOVE_TO_CUTTER   
    BOX_DO_CUT

[gcode_macro DISABLE_BOX_HEATER]
description: Box end gcode wrapped in stock macro
gcode:
    SET_HEATER_TEMPERATURE HEATER=box1_heater TARGET=0

[gcode_macro TRY_SELFRECOVERY]
description: Print resume with error handling
gcode:
    {% set T = printer.mmu.tool %}
    MMU_RESTORE
    MMU_CHANGE_TOOL TOOL={T} STANDALONE=1

