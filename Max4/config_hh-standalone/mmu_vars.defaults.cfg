# =====================================================================
# Bunny Box — vetted DEFAULT calibration baseline (Max4 + stock Qidi Box)
# =====================================================================
# OPTIONAL starting point only. The installer seeds these values into your
# active Happy Hare save_variables file when you answer "yes" to the optional
# "seed default calibration" prompt (or pass --default-calibration=yes).
#
# IMPORTANT:
#   * These are STARTING values for a stock 4-gate Qidi Box. The gear rotation
#     distance and encoder resolution are BOX hardware, so they are shared with
#     the Plus4/Q2 baseline. They are NOT a substitute for calibrating your own
#     unit — run MMU_CALIBRATE_GEAR and MMU_CALIBRATE_ENCODER.
#   * Bowden length is intentionally NOT seeded: it is PRINTER-specific (the
#     tube run from the box to the Max4's extruder differs from the Plus4/Q2),
#     and Happy Hare auto-calibrates it on first load (autocal_bowden_length: 1).
#   * The installer only adds values MISSING from your save_variables; it NEVER
#     overwrites calibration you already have.
#   * Per-gate lists assume 4 gates (one stock Qidi Box). Adjust if different.
#   * mmu__revision is intentionally NOT seeded here — the installer manages it.
#
# Format is a standard Klipper save_variables block (Python-literal values).
[Variables]
# Gear rotation distance per gate (MMU_CALIBRATE_GEAR) — box hardware. Default ~13.6.
mmu_gear_rotation_distances = [13.5171, 13.5171, 13.5171, 13.5171]
# Encoder resolution (MMU_CALIBRATE_ENCODER) — box hardware. Default ~3.0.
mmu_encoder_resolution = 2.9888
# Homing reference used when the bowden length is calibrated.
mmu_calibration_bowden_home = 'mmu_gate'
# Clog-detection length (auto-derived during encoder calibration / autotune).
mmu_calibration_clog_length = 11.8
