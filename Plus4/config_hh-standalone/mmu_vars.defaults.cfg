# =====================================================================
# Bunny Box — vetted DEFAULT calibration baseline (Plus4 + stock Qidi Box)
# =====================================================================
# OPTIONAL starting point only. The installer seeds these values into your
# active Happy Hare save_variables file when you answer "yes" to the optional
# "seed default calibration" prompt (or pass --default-calibration=yes).
#
# IMPORTANT:
#   * These are STARTING values for a STOCK Plus4 with a stock 4-gate Qidi Box.
#     They are NOT a substitute for calibrating your own unit — the Qidi encoder
#     in particular varies per machine. After seeding you should STILL run
#     MMU_CALIBRATE_GEAR and MMU_CALIBRATE_ENCODER (see the README).
#   * The installer only adds values that are MISSING from your save_variables;
#     it NEVER overwrites calibration you already have.
#   * The per-gate lists assume 4 gates (stock single Qidi Box). If you run a
#     different gate count, adjust the list length to match num_gates.
#   * mmu__revision is intentionally NOT seeded here — the installer manages it.
#
# These numbers are a reference snapshot from a working stock Plus4. If you are
# the maintainer committing a new baseline, confirm they still represent a clean
# stock machine before relying on them.
#
# Format is a standard Klipper save_variables block (Python-literal values).
[Variables]
# Gear rotation distance per gate (MMU_CALIBRATE_GEAR). Hardware default ~13.6.
mmu_gear_rotation_distances = [13.5171, 13.5171, 13.5171, 13.5171]
# Encoder resolution (MMU_CALIBRATE_ENCODER). Hardware default ~3.0.
mmu_encoder_resolution = 2.9888
# Bowden length per gate (MMU_CALIBRATE_BOWDEN), gate -> extruder, in mm.
mmu_calibration_bowden_lengths = [584.4, 584.4, 584.4, 584.4]
# Homing reference used when the bowden length was calibrated.
mmu_calibration_bowden_home = 'mmu_gate'
# Clog-detection length (auto-derived during encoder calibration / autotune).
mmu_calibration_clog_length = 11.8
